openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Job Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: jobs
  - name: companies
  - name: applications
  - name: admin

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Auth ────────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Users ───────────────────────────────────────────────────────────────────
  /users/profile:
    get:
      operationId: getProfile
      tags: [users]
      summary: Get my profile
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      operationId: updateProfile
      tags: [users]
      summary: Update my profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/resume:
    post:
      operationId: uploadResume
      tags: [users]
      summary: Upload resume (multipart)
      responses:
        "200":
          description: Resume uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeUploadResponse"

  /users/avatar:
    post:
      operationId: uploadAvatar
      tags: [users]
      summary: Upload avatar (multipart)
      responses:
        "200":
          description: Avatar uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvatarUploadResponse"

  # ─── Companies ───────────────────────────────────────────────────────────────
  /companies:
    get:
      operationId: listCompanies
      tags: [companies]
      summary: List all companies
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: List of companies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyListResponse"
    post:
      operationId: createCompany
      tags: [companies]
      summary: Create a company (recruiter)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyInput"
      responses:
        "201":
          description: Created company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /companies/{id}:
    get:
      operationId: getCompany
      tags: [companies]
      summary: Get a company by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
    put:
      operationId: updateCompany
      tags: [companies]
      summary: Update a company
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyUpdate"
      responses:
        "200":
          description: Updated company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
    delete:
      operationId: deleteCompany
      tags: [companies]
      summary: Delete a company
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /companies/my:
    get:
      operationId: getMyCompanies
      tags: [companies]
      summary: Get recruiter's own companies
      responses:
        "200":
          description: My companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"

  /companies/{id}/logo:
    post:
      operationId: uploadCompanyLogo
      tags: [companies]
      summary: Upload company logo
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Logo uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoUploadResponse"

  # ─── Jobs ────────────────────────────────────────────────────────────────────
  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List / search jobs
      parameters:
        - in: query
          name: keyword
          schema:
            type: string
        - in: query
          name: location
          schema:
            type: string
        - in: query
          name: type
          schema:
            type: string
        - in: query
          name: salary
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 12
      responses:
        "200":
          description: Jobs list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Post a new job (recruiter)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobInput"
      responses:
        "201":
          description: Created job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/my:
    get:
      operationId: getMyJobs
      tags: [jobs]
      summary: Get recruiter's posted jobs
      responses:
        "200":
          description: My jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"

  /jobs/featured:
    get:
      operationId: getFeaturedJobs
      tags: [jobs]
      summary: Get featured/trending jobs
      responses:
        "200":
          description: Featured jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"

  /jobs/stats:
    get:
      operationId: getJobStats
      tags: [jobs]
      summary: Dashboard stats (totals, by type, by location)
      responses:
        "200":
          description: Job statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStats"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get a single job
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    put:
      operationId: updateJob
      tags: [jobs]
      summary: Update a job (recruiter)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobUpdate"
      responses:
        "200":
          description: Updated job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    delete:
      operationId: deleteJob
      tags: [jobs]
      summary: Delete a job (recruiter)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ─── Applications ────────────────────────────────────────────────────────────
  /applications:
    get:
      operationId: getMyApplications
      tags: [applications]
      summary: Get seeker's applied jobs
      responses:
        "200":
          description: Applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Application"

  /applications/{jobId}:
    post:
      operationId: applyJob
      tags: [applications]
      summary: Apply for a job
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationInput"
      responses:
        "201":
          description: Applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /applications/{jobId}/applicants:
    get:
      operationId: getApplicants
      tags: [applications]
      summary: Get applicants for a job (recruiter)
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Applicants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Application"

  /applications/{applicationId}/status:
    patch:
      operationId: updateApplicationStatus
      tags: [applications]
      summary: Update application status (recruiter)
      parameters:
        - in: path
          name: applicationId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  # ─── Admin ───────────────────────────────────────────────────────────────────
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Admin dashboard stats
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users (admin)
      parameters:
        - in: query
          name: role
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListResponse"

  /admin/users/{id}:
    delete:
      operationId: adminDeleteUser
      tags: [admin]
      summary: Delete a user (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/jobs:
    get:
      operationId: adminListJobs
      tags: [admin]
      summary: List all jobs (admin)
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"

  /admin/jobs/{id}:
    delete:
      operationId: adminDeleteJob
      tags: [admin]
      summary: Delete a job (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SuccessResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    # ─── Auth ─────────────────────────────────────────────────────────────────
    RegisterInput:
      type: object
      required: [fullName, email, password, role]
      properties:
        fullName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [seeker, recruiter]
        phoneNumber:
          type: string

    LoginInput:
      type: object
      required: [email, password, role]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        role:
          type: string
          enum: [seeker, recruiter, admin]

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    # ─── Users ────────────────────────────────────────────────────────────────
    User:
      type: object
      required: [_id, fullName, email, role]
      properties:
        _id:
          type: string
        fullName:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [seeker, recruiter, admin]
        phoneNumber:
          type: ["string", "null"]
        avatar:
          type: ["string", "null"]
        createdAt:
          type: string

    UserProfile:
      type: object
      required: [_id, fullName, email, role]
      properties:
        _id:
          type: string
        fullName:
          type: string
        email:
          type: string
        role:
          type: string
        phoneNumber:
          type: ["string", "null"]
        avatar:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        skills:
          type: array
          items:
            type: string
        resumeUrl:
          type: ["string", "null"]
        resumeName:
          type: ["string", "null"]
        experience:
          type: ["integer", "null"]
        education:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        createdAt:
          type: string

    ProfileUpdate:
      type: object
      properties:
        fullName:
          type: string
        phoneNumber:
          type: string
        bio:
          type: string
        skills:
          type: array
          items:
            type: string
        experience:
          type: integer
        education:
          type: string
        location:
          type: string

    ResumeUploadResponse:
      type: object
      required: [resumeUrl, resumeName]
      properties:
        resumeUrl:
          type: string
        resumeName:
          type: string

    AvatarUploadResponse:
      type: object
      required: [avatarUrl]
      properties:
        avatarUrl:
          type: string

    # ─── Companies ────────────────────────────────────────────────────────────
    Company:
      type: object
      required: [_id, name, recruiter]
      properties:
        _id:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        industry:
          type: ["string", "null"]
        size:
          type: ["string", "null"]
        logo:
          type: ["string", "null"]
        recruiter:
          type: string
        createdAt:
          type: string

    CompanyInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        website:
          type: string
        location:
          type: string
        industry:
          type: string
        size:
          type: string

    CompanyUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        website:
          type: string
        location:
          type: string
        industry:
          type: string
        size:
          type: string

    CompanyListResponse:
      type: object
      required: [companies, total, page, pages]
      properties:
        companies:
          type: array
          items:
            $ref: "#/components/schemas/Company"
        total:
          type: integer
        page:
          type: integer
        pages:
          type: integer

    LogoUploadResponse:
      type: object
      required: [logoUrl]
      properties:
        logoUrl:
          type: string

    # ─── Jobs ─────────────────────────────────────────────────────────────────
    Job:
      type: object
      required: [_id, title, description, company, recruiter, location, type, salary]
      properties:
        _id:
          type: string
        title:
          type: string
        description:
          type: string
        requirements:
          type: array
          items:
            type: string
        company:
          $ref: "#/components/schemas/Company"
        recruiter:
          type: string
        location:
          type: string
        type:
          type: string
          enum: [full-time, part-time, contract, internship, remote]
        salary:
          type: string
        experience:
          type: ["string", "null"]
        skills:
          type: array
          items:
            type: string
        applicantsCount:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string

    JobInput:
      type: object
      required: [title, description, company, location, type, salary]
      properties:
        title:
          type: string
        description:
          type: string
        requirements:
          type: array
          items:
            type: string
        company:
          type: string
        location:
          type: string
        type:
          type: string
          enum: [full-time, part-time, contract, internship, remote]
        salary:
          type: string
        experience:
          type: string
        skills:
          type: array
          items:
            type: string

    JobUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        requirements:
          type: array
          items:
            type: string
        location:
          type: string
        type:
          type: string
          enum: [full-time, part-time, contract, internship, remote]
        salary:
          type: string
        experience:
          type: string
        skills:
          type: array
          items:
            type: string
        isActive:
          type: boolean

    JobListResponse:
      type: object
      required: [jobs, total, page, pages]
      properties:
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/Job"
        total:
          type: integer
        page:
          type: integer
        pages:
          type: integer

    JobStats:
      type: object
      required: [totalJobs, byType, topLocations, totalCompanies, totalApplications]
      properties:
        totalJobs:
          type: integer
        byType:
          type: array
          items:
            type: object
            required: [type, count]
            properties:
              type:
                type: string
              count:
                type: integer
        topLocations:
          type: array
          items:
            type: object
            required: [location, count]
            properties:
              location:
                type: string
              count:
                type: integer
        totalCompanies:
          type: integer
        totalApplications:
          type: integer

    # ─── Applications ─────────────────────────────────────────────────────────
    Application:
      type: object
      required: [_id, job, applicant, status, createdAt]
      properties:
        _id:
          type: string
        job:
          $ref: "#/components/schemas/Job"
        applicant:
          $ref: "#/components/schemas/UserProfile"
        coverLetter:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, reviewed, shortlisted, rejected, accepted]
        createdAt:
          type: string

    ApplicationInput:
      type: object
      properties:
        coverLetter:
          type: string

    ApplicationStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, reviewed, shortlisted, rejected, accepted]

    # ─── Admin ────────────────────────────────────────────────────────────────
    AdminStats:
      type: object
      required: [totalUsers, totalRecruiters, totalSeekers, totalJobs, totalCompanies, totalApplications, recentActivity]
      properties:
        totalUsers:
          type: integer
        totalRecruiters:
          type: integer
        totalSeekers:
          type: integer
        totalJobs:
          type: integer
        totalCompanies:
          type: integer
        totalApplications:
          type: integer
        recentActivity:
          type: array
          items:
            type: object
            required: [type, description, createdAt]
            properties:
              type:
                type: string
              description:
                type: string
              createdAt:
                type: string

    AdminUserListResponse:
      type: object
      required: [users, total, page, pages]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        pages:
          type: integer
